<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookMark</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="header-title">BookMark</h1>
      </header>

      <div class="form">
        <div class="field">
          <label class="label" for="url">URL</label>
          <input type="text" id="url" class="input input-readonly" readonly />
        </div>

        <div class="field">
          <label class="label" for="title">Title</label>
          <input
            type="text"
            id="title"
            class="input"
            placeholder="Page title"
          />
        </div>

        <button id="btn-save" class="btn-save">Save Bookmark</button>

        <button id="btn-details" class="btn-toggle" type="button">
          <span id="toggle-text">Add details</span>
          <span id="toggle-icon" class="toggle-icon">&#9662;</span>
        </button>

        <div id="details" class="details collapsed">
          <div class="field">
            <label class="label" for="tags">Tags</label>
            <input
              type="text"
              id="tags"
              class="input"
              placeholder="Comma-separated tags"
            />
          </div>
          <div class="field">
            <label class="label" for="notes">Notes</label>
            <textarea
              id="notes"
              class="input textarea"
              rows="3"
              placeholder="Optional notes..."
            ></textarea>
          </div>
        </div>
      </div>

      <div id="status" class="status hidden"></div>
    </div>
    <script type="module" src="main.ts"></script>
  </body>
</html>
